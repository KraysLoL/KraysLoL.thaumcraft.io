<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Thaumcraft Research Assistant</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>

<style>

body{
background:#202020;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.toolbar{
display:flex;
gap:10px;
margin-bottom:20px;
align-items:center;
}

canvas{
border:1px solid #555;
background:#111;
max-width:100%;
}

#log{
margin-top:20px;
background:black;
padding:10px;
height:200px;
overflow:auto;
font-size:12px;
font-family:monospace;
}

button,input{
background:#333;
color:white;
padding:8px;
}

</style>
</head>

<body>

<h2>
Thaumcraft Research Assistant
</h2>

<div class="toolbar">

<input
type=file
id=upload
accept=image/*
>

<button id=recognizeBtn>

Распознать и импортировать

</button>

</div>


<canvas id=recognitionCanvas></canvas>

<div id=log></div>

<script src="grid.js"></script>
<script src="app.js"></script>

</body>
</html>
