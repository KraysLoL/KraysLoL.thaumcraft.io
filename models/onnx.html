<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>YOLO ONNX Detector</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>

<style>
body{
    font-family:monospace;
    background:#0b1220;
    color:#ddd;
    max-width:1400px;
    margin:auto;
    padding:20px;
}
canvas{
    border:1px solid #555;
    max-width:100%;
}
.controls{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:20px;
}
#log{
    margin-top:20px;
    background:black;
    padding:10px;
    max-height:350px;
    overflow:auto;
    font-size:11px;
}
button,input,select{
    background:#223;
    color:white;
}
</style>
</head>

<body>

<h2>YOLO Aspect Detection</h2>

<div class="controls">

<input type="file" id="upload">

<label>
conf:
<input
type="range"
id="conf"
min="0"
max="1"
step="0.01"
value="0.25">
<span id="confVal">0.25</span>
</label>

<label>
BGR
<input
type="checkbox"
id="bgr">
</label>

<select id="norm">

<option value="0_255">
0..255
</option>

<option value="0_1" selected>
0..1
</option>

<option value="neg1_1">
-1..1
</option>

</select>

<button id="clear">
clear
</button>

</div>

<canvas id="canvas"></canvas>

<div id="log"></div>

<script>

let session=null;
let classNames=[];
let originalImg=null;

const INPUT=640;
const IOU=0.45;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let confThreshold=.25;


document.getElementById("conf").oninput=(e)=>{

confThreshold=parseFloat(e.target.value);

document.getElementById(
"confVal"
).innerText=confThreshold;

if(originalImg)
recognize(originalImg);

};


document.getElementById(
"clear"
).onclick=()=>{

document.getElementById(
"log"
).innerHTML='';

};


function log(t,error=false){

const div=document.getElementById(
"log"
);

div.innerHTML+=`
<div style="color:${
error?"#f88":"#9f9"
}">
${t}
</div>
`;

div.scrollTop=div.scrollHeight;

console.log(t);

}


function sigmoid(x){

return 1/(1+Math.exp(-x));

}


async function init(){

try{

let txt=
await(
await fetch(
'models/field_class_names.txt'
)
).text();

classNames=
txt
.split(/\r?\n/)
.filter(x=>x.trim());

log(
"classes="+
classNames.length
);

session=
await ort.InferenceSession.create(
'models/field_object_detection.onnx'
);

log(
"input="+
session.inputNames
);

log(
"output="+
session.outputNames
);

}
catch(e){

log(
e.message,
true
);

}

}


function preprocess(img){

const useBGR=
document.getElementById(
"bgr"
).checked;

const norm=
document.getElementById(
"norm"
).value;

const c=document.createElement(
"canvas"
);

c.width=INPUT;
c.height=INPUT;

const cx=c.getContext("2d");

cx.fillStyle="black";

cx.fillRect(
0,
0,
INPUT,
INPUT
);

let scale=Math.min(
INPUT/img.width,
INPUT/img.height
);

let w=img.width*scale;
let h=img.height*scale;

let dx=(INPUT-w)/2;
let dy=(INPUT-h)/2;

cx.drawImage(
img,
dx,
dy,
w,
h
);

const pixels=
cx.getImageData(
0,
0,
INPUT,
INPUT
).data;

const size=
INPUT*INPUT;

const data=
new Float32Array(
size*3
);

for(
let i=0;
i<size;
i++
){

let r=pixels[i*4];
let g=pixels[i*4+1];
let b=pixels[i*4+2];

if(norm==="0_1"){

r/=255;
g/=255;
b/=255;

}

if(norm==="neg1_1"){

r=r/127.5-1;
g=g/127.5-1;
b=b/127.5-1;

}

if(useBGR){

data[i]=b;
data[size+i]=g;
data[size*2+i]=r;

}
else{

data[i]=r;
data[size+i]=g;
data[size*2+i]=b;

}

}

return {
tensor:new ort.Tensor(
"float32",
data,
[1,3,INPUT,INPUT]
),
scale,
dx,
dy
};

}


function iou(a,b){

let x1=Math.max(
a.x,
b.x
);

let y1=Math.max(
a.y,
b.y
);

let x2=Math.min(
a.x+a.w,
b.x+b.w
);

let y2=Math.min(
a.y+a.h,
b.y+b.h
);

let inter=
Math.max(
0,
x2-x1
)
*
Math.max(
0,
y2-y1
);

let union=
a.w*a.h+
b.w*b.h-
inter;

return inter/union;

}


async function recognize(img){

if(!session)
return;

try{

log(
"processing..."
);

const prep=
preprocess(img);

const feeds={
images:prep.tensor
};

const output=
await session.run(
feeds
);

const out=
output.output0;

const data=
out.data;

const dims=
out.dims;

log(
"dims="+
JSON.stringify(
dims
)
);

for(
let i=0;
i<15;
i++
){

log(
"["+i+"] "+
data[i].toFixed(4)
);

}

let numPred;
let numChannels;

if(
dims[2]==85
){

numPred=dims[1];
numChannels=85;

}
else if(
dims[1]==85
){

numPred=dims[2];
numChannels=85;

}
else{

log(
"unknown shape",
true
);

return;

}


let detections=[];


for(
let i=0;
i<numPred;
i++
){

let base=
i*numChannels;


let cx=
data[base];

let cy=
data[base+1];

let w=
data[base+2];

let h=
data[base+3];


let obj=
sigmoid(
data[base+4]
);

if(
obj<
confThreshold
)
continue;


let best=0;
let cls=-1;


for(
let c=0;
c<
classNames.length;
c++
){

let p=
sigmoid(
data[
base+5+c
]
);

if(
p>best
){

best=p;

cls=c;

}

}


let conf=
best*obj;

if(
conf<
confThreshold
)
continue;


cx*=INPUT;
cy*=INPUT;
w*=INPUT;
h*=INPUT;


let x=
cx-w/2;

let y=
cy-h/2;


detections.push({

x,
y,
w,
h,

confidence:
conf,

classId:
cls

});

}


log(
"before nms="+
detections.length
);


detections.sort(
(a,b)=>
b.confidence-
a.confidence
);


const final=[];


for(
let d of detections
){

let keep=true;

for(
let f of final
){

if(
iou(
d,
f
)>IOU
){

keep=false;

break;

}

}

if(keep)
final.push(d);

}


canvas.width=
img.width;

canvas.height=
img.height;

ctx.drawImage(
img,
0,
0
);


const scale=
prep.scale;


for(
let d of final
){

let x=
(d.x-prep.dx)/
scale;

let y=
(d.y-prep.dy)/
scale;

let w=
d.w/
scale;

let h=
d.h/
scale;


ctx.strokeStyle=
"#ffaa00";

ctx.lineWidth=2;

ctx.strokeRect(
x,
y,
w,
h
);


ctx.fillStyle=
"#ffcc00";

ctx.font=
"14px monospace";


let name=
classNames[
d.classId
]||d.classId;


ctx.fillText(

name+
" "+
(
d.confidence*100
).toFixed(1)+
"%",

x,
y-5

);

}


log(
"FINAL="+
final.length
);

}
catch(e){

log(
e.message,
true
);

}

}



document.getElementById(
"upload"
).onchange=e=>{

let file=
e.target.files[0];

if(!file)
return;


let img=
new Image();

img.onload=()=>{

originalImg=
img;

recognize(
img
);

};

img.src=
URL.createObjectURL(
file
);

};


init();

</script>
</body>
</html>
