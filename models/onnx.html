<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Распознавание аспектов YOLO ONNX</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>

<style>
body{
    background:#0b1220;
    color:#ddd;
    font-family:monospace;
    padding:20px;
    max-width:1400px;
    margin:auto;
}

h2{
    color:#fff;
}

.controls{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

canvas{
    border:1px solid #555;
    max-width:100%;
    background:#222;
}

#log{
    margin-top:20px;
    background:black;
    padding:10px;
    max-height:350px;
    overflow:auto;
    font-size:11px;
}

input,button{
    background:#223;
    color:white;
}

</style>
</head>

<body>

<h2>🔍 Распознавание аспектов</h2>

<div class="controls">

<input type="file" id="upload" accept="image/*">

<label>

Порог:

<input
type="range"
id="conf"
min="0"
max="1"
step="0.01"
value="0.25">

<span id="confv">0.25</span>

</label>

<button id="clear">
Очистить лог
</button>

</div>

<canvas id="canvas"></canvas>

<div id="log"></div>

<script>

const INPUT=640;
const IOU=.45;
const MAX_DETECTIONS=300;

let session=null;
let classNames=[];
let originalImg=null;
let conf=.25;

const canvas=
document.getElementById(
"canvas"
);

const ctx=
canvas.getContext(
"2d"
);

function log(s,error=false){

let div=
document.getElementById(
"log"
);

div.innerHTML+=
`<div style="color:${
error?"#f88":"#8f8"
}">
${s}
</div>`;

div.scrollTop=
div.scrollHeight;

console.log(s);

}


function sigmoid(x){

return 1/(1+Math.exp(-x));

}



document
.getElementById(
"conf"
)
.oninput=e=>{

conf=
parseFloat(
e.target.value
);

document
.getElementById(
"confv"
)
.innerText=
conf;

if(originalImg)
recognize(
originalImg
);

};


document
.getElementById(
"clear"
)
.onclick=()=>{

document
.getElementById(
"log"
)
.innerHTML='';

};



async function init(){

try{

let txt=
await(
await fetch(
"models/field_class_names.txt"
)
).text();

classNames=
txt
.split(/\r?\n/)
.filter(
x=>x.trim()
);

log(
"classes="+
classNames.length
);

session=
await ort
.InferenceSession
.create(
"models/field_object_detection.onnx"
);

log(
"input="+
session.inputNames
);

log(
"output="+
session.outputNames
);

}
catch(e){

log(
e.message,
true
);

}

}



function preprocess(img){

const c=
document.createElement(
"canvas"
);

c.width=INPUT;
c.height=INPUT;

let cx=
c.getContext(
"2d"
);

cx.fillStyle=
"black";

cx.fillRect(
0,
0,
INPUT,
INPUT
);

let scale=
Math.min(
INPUT/img.width,
INPUT/img.height
);

let w=
img.width*scale;

let h=
img.height*scale;

let dx=
(INPUT-w)/2;

let dy=
(INPUT-h)/2;

cx.drawImage(
img,
dx,
dy,
w,
h
);

let pixels=
cx
.getImageData(
0,0,
INPUT,
INPUT
)
.data;


let size=
INPUT*INPUT;

let data=
new Float32Array(
3*size
);


for(
let i=0;
i<size;
i++
){

let r=
pixels[i*4]/255;

let g=
pixels[i*4+1]/255;

let b=
pixels[i*4+2]/255;

data[i]=r;
data[size+i]=g;
data[2*size+i]=b;

}

return{

tensor:
new ort.Tensor(
"float32",
data,
[1,3,INPUT,INPUT]
),

scale,
dx,
dy

};

}



function iou(a,b){

let x1=
Math.max(
a.x,
b.x
);

let y1=
Math.max(
a.y,
b.y
);

let x2=
Math.min(
a.x+a.w,
b.x+b.w
);

let y2=
Math.min(
a.y+a.h,
b.y+b.h
);

let inter=
Math.max(
0,
x2-x1
)
*
Math.max(
0,
y2-y1
);

let union=
a.w*a.h+
b.w*b.h-
inter;

return inter/union;

}



async function recognize(img){

if(!session)
return;

try{

const prep=
preprocess(
img
);

const output=
await session.run({

images:
prep.tensor

});

const out=
output.output0;

const data=
out.data;

const dims=
out.dims;


log(
"dims="+
JSON.stringify(
dims
)
);


let numChannels=
dims[1];

let numPred=
dims[2];


let det=[];


for(
let i=0;
i<numPred;
i++
){

let cx=
data[
0*numPred+i
];

let cy=
data[
1*numPred+i
];

let w=
data[
2*numPred+i
];

let h=
data[
3*numPred+i
];


let obj=
sigmoid(

data[
4*numPred+i
]

);


if(
obj<conf
)
continue;


let best=0;

let cls=-1;


for(
let c=0;
c<classNames.length;
c++
){

let p=
sigmoid(

data[
(c+5)
*
numPred+i
]

);


if(
p>best
){

best=p;

cls=c;

}

}


let score=
obj*best;

if(
score<conf
)
continue;


det.push({

x:cx-w/2,
y:cy-h/2,

w,
h,

score,
cls

});

}


log(
"before nms="+
det.length
);


det.sort(
(a,b)=>
b.score-a.score
);


det=
det.slice(
0,
MAX_DETECTIONS
);


let final=[];


for(
let d of det
){

let keep=true;


for(
let f of final
){

if(
d.cls===f.cls &&
iou(d,f)>IOU
){

keep=false;
break;

}

}

if(keep)
final.push(d);

}


log(
"FINAL="+
final.length
);


canvas.width=
img.width;

canvas.height=
img.height;


ctx.drawImage(
img,
0,
0
);


for(
let d of final
){

let x=
(d.x-prep.dx)
/
prep.scale;

let y=
(d.y-prep.dy)
/
prep.scale;

let w=
d.w/
prep.scale;

let h=
d.h/
prep.scale;



x=Math.max(
0,
Math.min(
x,
img.width
));

y=Math.max(
0,
Math.min(
y,
img.height
));

w=Math.min(
w,
img.width-x
);

h=Math.min(
h,
img.height-y
);



ctx.strokeStyle=
"#ffaa00";

ctx.lineWidth=2;

ctx.strokeRect(
x,
y,
w,
h
);


ctx.fillStyle=
"#ffcc00";

ctx.font=
"14px monospace";


let name=
classNames[
d.cls
]||
d.cls;


ctx.fillText(

name+
" "+
(
d.score*100
).toFixed(1)+
"%",

x,
y-4

);

}


}
catch(e){

log(
e.message,
true
);

}

}



document
.getElementById(
"upload"
)
.onchange=e=>{

let file=
e.target.files[0];

if(!file)
return;


let img=
new Image();


img.onload=()=>{

originalImg=
img;

recognize(
img
);

};


img.src=
URL.createObjectURL(
file
);

};



init();

</script>

</body>
</html>
