<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Распознавание аспектов (финальная версия)</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <style>
        body { font-family: monospace; background: #0a0f1e; color: #ddd; padding: 20px; max-width: 1200px; margin: 0 auto; }
        canvas { border: 1px solid #3e5a6c; max-width: 100%; background: #1e2a36; }
        .controls { display: flex; flex-wrap: wrap; gap: 12px; margin: 15px 0; background: #11161f; padding: 12px; border-radius: 8px; align-items: center; }
        .param-group { background: #1a2230; padding: 6px 12px; border-radius: 6px; }
        button, input[type="file"] { background: #2c4c6c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        #log { background: #000; padding: 10px; max-height: 350px; overflow: auto; font-size: 11px; margin-top: 15px; }
        .status { color: #8bc34a; }
        input[type="range"] { width: 120px; }
        select { background: #2c3e50; color: white; border: 1px solid #4a6a8a; border-radius: 4px; padding: 4px; }
    </style>
</head>
<body>
<h2>🔍 Распознавание аспектов (оптимизировано для вашей модели)</h2>
<div class="controls">
    <input type="file" id="upload" accept="image/*">
    <div class="param-group">
        <label>Порог:</label>
        <input type="range" id="conf" min="0.05" max="0.95" step="0.01" value="0.30">
        <span id="confVal">0.30</span>
    </div>
    <div class="param-group">
        <label>BGR:</label>
        <input type="checkbox" id="bgrCheck" checked>
    </div>
    <div class="param-group">
        <label>Нормализация:</label>
        <select id="normSelect">
            <option value="0_1" selected>[0, 1] (деление на 255)</option>
            <option value="0_255">[0, 255]</option>
            <option value="neg1_1">[-1, 1]</option>
        </select>
    </div>
    <div class="param-group">
        <label>Сигмоида на выходе:</label>
        <input type="checkbox" id="sigmoidCheck" checked>
    </div>
    <div class="param-group">
        <label>Канал объектности:</label>
        <input type="number" id="objIdx" value="3" min="0" max="10" step="1" style="width:60px">
    </div>
    <button id="clearLog">Очистить лог</button>
</div>
<canvas id="canvas"></canvas>
<div id="log"></div>

<script>
    let session = null;
    let classNames = [];
    let originalImg = null;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let confThreshold = 0.30;
    const IOU_THRESH = 0.45;
    const INPUT_SIZE = 640;
    
    // Стандартные якоря YOLO (оставлены для совместимости)
    const ANCHORS = [
        [10,13], [16,30], [33,23],
        [30,61], [62,45], [59,119],
        [116,90], [156,198], [373,326]
    ];

    document.getElementById('conf').addEventListener('input', (e) => {
        confThreshold = parseFloat(e.target.value);
        document.getElementById('confVal').innerText = confThreshold;
        if (originalImg) recognize(originalImg);
    });
    document.getElementById('clearLog').addEventListener('click', () => {
        document.getElementById('log').innerHTML = '';
    });

    function log(msg, isError = false) {
        const div = document.getElementById('log');
        const color = isError ? '#ff8888' : '#bbff88';
        div.innerHTML += `<div style="color:${color}">${msg}</div>`;
        div.scrollTop = div.scrollHeight;
        console.log(msg);
    }

    async function init() {
        try {
            const resp = await fetch('models/field_class_names.txt');
            if (!resp.ok) throw new Error(`Не найден models/field_class_names.txt (${resp.status})`);
            let text = await resp.text();
            let rawNames = text.split(/\r?\n/).filter(l => l.trim().length > 0);
            classNames = rawNames;
            log(`📄 Загружено имён классов: ${classNames.length}`);
            log(`⏳ Загрузка модели...`);
            session = await ort.InferenceSession.create('models/field_object_detection.onnx');
            log(`✅ Модель загружена. Вход: ${session.inputNames}, выход: ${session.outputNames}`);
        } catch(e) { 
            log(`❌ Ошибка: ${e.message}`, true);
        }
    }

    function preprocess(img, useBGR, normType) {
        const canvasPrep = document.createElement('canvas');
        canvasPrep.width = INPUT_SIZE;
        canvasPrep.height = INPUT_SIZE;
        const ctxp = canvasPrep.getContext('2d');
        ctxp.fillStyle = '#000';
        ctxp.fillRect(0, 0, INPUT_SIZE, INPUT_SIZE);
        const scale = Math.min(INPUT_SIZE / img.width, INPUT_SIZE / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        const dx = (INPUT_SIZE - w) / 2;
        const dy = (INPUT_SIZE - h) / 2;
        ctxp.drawImage(img, dx, dy, w, h);
        const imgData = ctxp.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
        const data = new Float32Array(3 * INPUT_SIZE * INPUT_SIZE);
        const size = INPUT_SIZE * INPUT_SIZE;
        for (let i = 0; i < size; i++) {
            let r = imgData.data[i*4];
            let g = imgData.data[i*4+1];
            let b = imgData.data[i*4+2];
            if (normType === '0_1') {
                r /= 255; g /= 255; b /= 255;
            } else if (normType === 'neg1_1') {
                r = r / 127.5 - 1;
                g = g / 127.5 - 1;
                b = b / 127.5 - 1;
            }
            if (useBGR) {
                data[i] = b;
                data[size + i] = g;
                data[2*size + i] = r;
            } else {
                data[i] = r;
                data[size + i] = g;
                data[2*size + i] = b;
            }
        }
        return new ort.Tensor('float32', data, [1, 3, INPUT_SIZE, INPUT_SIZE]);
    }

    function iou(b1, b2) {
        const x1 = b1[0] - b1[2]/2, y1 = b1[1] - b1[3]/2;
        const x2 = b1[0] + b1[2]/2, y2 = b1[1] + b1[3]/2;
        const x1b = b2[0] - b2[2]/2, y1b = b2[1] - b2[3]/2;
        const x2b = b2[0] + b2[2]/2, y2b = b2[1] + b2[3]/2;
        const interX1 = Math.max(x1, x1b), interY1 = Math.max(y1, y1b);
        const interX2 = Math.min(x2, x2b), interY2 = Math.min(y2, y2b);
        const inter = Math.max(0, interX2 - interX1) * Math.max(0, interY2 - interY1);
        const area1 = (x2 - x1) * (y2 - y1);
        const area2 = (x2b - x1b) * (y2b - y1b);
        return inter / (area1 + area2 - inter);
    }

    async function recognize(img) {
        if (!session) { log('Модель не загружена', true); return; }
        
        const useBGR = document.getElementById('bgrCheck').checked;
        const normType = document.getElementById('normSelect').value;
        const useSigmoid = document.getElementById('sigmoidCheck').checked;
        const objChannel = parseInt(document.getElementById('objIdx').value);
        
        log(`⚙️ BGR=${useBGR}, норм=${normType}, сигмоида=${useSigmoid}, канал obj=${objChannel}, порог=${confThreshold}`);
        log(`⏳ Обработка ${img.width}x${img.height}...`);
        
        try {
            const tensor = preprocess(img, useBGR, normType);
            const feeds = { images: tensor };
            const output = await session.run(feeds);
            const outTensor = output['output0'];
            const data = outTensor.data;
            const dims = outTensor.dims;
            
            // Определяем формат: [1,85,8400] или [1,8400,85]
            let numPred, numChannels, isTransposed;
            if (dims[1] === 85 && dims[2] > 1000) {
                numChannels = 85;
                numPred = dims[2];
                isTransposed = false;
            } else if (dims[2] === 85 && dims[1] > 1000) {
                numPred = dims[1];
                numChannels = 85;
                isTransposed = true;
            } else {
                log(`⚠️ Неизвестная размерность: ${dims}`, true);
                return;
            }
            const numClasses = numChannels - 5;
            if (classNames.length !== numClasses) {
                log(`⚠️ Имён классов ${classNames.length}, модель ожидает ${numClasses}. Обрезаю.`, true);
                classNames = classNames.slice(0, numClasses);
            }
            
            const gridSizes = [80, 40, 20];
            const anchorsPerScale = [ANCHORS.slice(0,3), ANCHORS.slice(3,6), ANCHORS.slice(6,9)];
            let detections = [];
            let offset = 0;
            let predOffset = 0;
            
            for (let s = 0; s < gridSizes.length; s++) {
                const gridSize = gridSizes[s];
                const anchors = anchorsPerScale[s];
                const numCells = gridSize * gridSize;
                for (let cell = 0; cell < numCells; cell++) {
                    const row = Math.floor(cell / gridSize);
                    const col = cell % gridSize;
                    for (let a = 0; a < 3; a++) {
                        let tx, ty, tw, th, objValue;
                        let classValues = new Array(numClasses);
                        if (!isTransposed) {
                            const idx = offset + cell;
                            tx = data[predOffset + idx];
                            ty = data[numPred + predOffset + idx];
                            tw = data[2*numPred + predOffset + idx];
                            th = data[3*numPred + predOffset + idx];
                            objValue = data[objChannel * numPred + predOffset + idx];
                            for (let c = 0; c < numClasses; c++) {
                                classValues[c] = data[(5+c)*numPred + predOffset + idx];
                            }
                        } else {
                            const idx = offset + cell;
                            const base = idx * numChannels;
                            tx = data[base];
                            ty = data[base+1];
                            tw = data[base+2];
                            th = data[base+3];
                            objValue = data[base + objChannel];
                            for (let c = 0; c < numClasses; c++) {
                                classValues[c] = data[base + 5 + c];
                            }
                        }
                        
                        // Преобразуем в вероятности, если нужно
                        const objProb = useSigmoid ? 1/(1+Math.exp(-objValue)) : objValue;
                        if (objProb < confThreshold) continue;
                        
                        // Декодирование координат (стандартное YOLO)
                        const cx = (useSigmoid ? 1/(1+Math.exp(-tx)) : tx) + col;
                        const cy = (useSigmoid ? 1/(1+Math.exp(-ty)) : ty) + row;
                        const w = anchors[a][0] * Math.exp(tw) / INPUT_SIZE;
                        const h = anchors[a][1] * Math.exp(th) / INPUT_SIZE;
                        
                        let bestClass = -1, bestProb = 0;
                        for (let c = 0; c < numClasses; c++) {
                            let prob = useSigmoid ? 1/(1+Math.exp(-classValues[c])) : classValues[c];
                            if (prob > bestProb) {
                                bestProb = prob;
                                bestClass = c;
                            }
                        }
                        let confidence = objProb * bestProb;
                        if (confidence < confThreshold) continue;
                        
                        detections.push({
                            bbox: [cx / gridSize, cy / gridSize, w, h],
                            confidence: confidence,
                            classId: bestClass
                        });
                    }
                }
                offset += numCells;
                predOffset += 3 * numPred;
            }
            
            log(`🔍 До NMS: ${detections.length}`);
            if (detections.length === 0) { drawResults([], img); log(`⚠️ Нет детекций`); return; }
            
            // NMS
            detections.sort((a,b) => b.confidence - a.confidence);
            const final = [];
            for (let d of detections) {
                let keep = true;
                for (let f of final) {
                    if (iou(d.bbox, f.bbox) > IOU_THRESH) { keep = false; break; }
                }
                if (keep) final.push(d);
            }
            
            // Пересчёт координат из letterbox
            const scale = Math.min(INPUT_SIZE / img.width, INPUT_SIZE / img.height);
            const padX = (INPUT_SIZE - img.width * scale) / 2 / INPUT_SIZE;
            const padY = (INPUT_SIZE - img.height * scale) / 2 / INPUT_SIZE;
            const invScale = 1 / scale;
            for (let d of final) {
                let cx = d.bbox[0];
                let cy = d.bbox[1];
                let w = d.bbox[2];
                let h = d.bbox[3];
                cx = (cx - padX) * invScale;
                cy = (cy - padY) * invScale;
                w = w * invScale;
                h = h * invScale;
                d.bbox = [
                    Math.min(1, Math.max(0, cx)),
                    Math.min(1, Math.max(0, cy)),
                    Math.min(1, Math.max(0, w)),
                    Math.min(1, Math.max(0, h))
                ];
            }
            
            drawResults(final, img);
            log(`🎉 Найдено ${final.length} аспектов.`);
            if (final.length) {
                const classesFound = new Set();
                final.forEach(d => classesFound.add(classNames[d.classId]));
                log(`   Классы: ${Array.from(classesFound).join(', ')}`);
                final.slice(0,5).forEach(d => {
                    log(`   - ${classNames[d.classId]} (${(d.confidence*100).toFixed(1)}%)`);
                });
            }
        } catch(e) {
            log(`❌ Ошибка: ${e.message}`, true);
        }
    }
    
    function drawResults(detections, img) {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        if (detections.length === 0) {
            ctx.fillStyle = 'white';
            ctx.font = '14px monospace';
            ctx.fillText('Ничего не найдено', 20, 40);
            return;
        }
        for (let d of detections) {
            let x = d.bbox[0] * img.width - (d.bbox[2] * img.width)/2;
            let y = d.bbox[1] * img.height - (d.bbox[3] * img.height)/2;
            let w = d.bbox[2] * img.width;
            let h = d.bbox[3] * img.height;
            ctx.strokeStyle = '#ffaa44';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            let name = classNames[d.classId] || `cls_${d.classId}`;
            ctx.fillStyle = '#ffcc88';
            ctx.font = '14px monospace';
            ctx.fillText(`${name} ${(d.confidence*100).toFixed(1)}%`, x, y-4);
        }
    }
    
    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            originalImg = img;
            recognize(img);
        };
        img.src = URL.createObjectURL(file);
    });
    
    init();
</script>
</body>
</html>
