<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Распознавание аспектов (исправленный NCHW)</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <style>
        body { font-family: monospace; background: #0a0f1e; color: #ddd; padding: 20px; }
        canvas { border: 1px solid #3e5a6c; max-width: 100%; }
        .slider { margin: 10px 0; }
        button { background: #2c4c6c; color: white; border: none; padding: 6px 12px; cursor: pointer; }
        #log { background: #000; padding: 10px; max-height: 400px; overflow: auto; font-size: 11px; }
    </style>
</head>
<body>
<h2>🔍 Распознавание аспектов (NCHW + сигмоида)</h2>
<input type="file" id="upload" accept="image/*">
<div>
    <label>Порог уверенности: <span id="confVal">0.3</span></label>
    <input type="range" id="conf" min="0.05" max="0.95" step="0.01" value="0.3">
</div>
<canvas id="canvas"></canvas>
<div id="log"></div>

<script>
    let session = null;
    let classNames = [];
    let originalImg = null;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let confThreshold = 0.3;
    const IOU_THRESH = 0.45;

    document.getElementById('conf').addEventListener('input', (e) => {
        confThreshold = parseFloat(e.target.value);
        document.getElementById('confVal').innerText = confThreshold;
        if (originalImg) recognize(originalImg);
    });

    async function init() {
        try {
            const resp = await fetch('models/field_class_names.txt');
            const text = await resp.text();
            classNames = text.split(/\r?\n/).filter(l => l.trim());
            log(`✅ Загружено классов: ${classNames.length}`);
            log(`⏳ Загрузка модели...`);
            session = await ort.InferenceSession.create('models/field_object_detection.onnx');
            log(`✅ Модель загружена. Вход: ${session.inputNames}, выход: ${session.outputNames}`);
        } catch(e) { log(`❌ Ошибка: ${e.message}`); }
    }

    function log(msg) {
        const div = document.getElementById('log');
        div.innerHTML += `<div>${msg}</div>`;
        div.scrollTop = div.scrollHeight;
        console.log(msg);
    }

    function sigmoid(x) {
        return 1 / (1 + Math.exp(-x));
    }

    async function preprocess(img) {
        const size = 640;
        const canvasPrep = document.createElement('canvas');
        canvasPrep.width = size;
        canvasPrep.height = size;
        const ctxp = canvasPrep.getContext('2d');
        ctxp.fillStyle = '#000';
        ctxp.fillRect(0, 0, size, size);
        const scale = Math.min(size / img.width, size / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        const dx = (size - w)/2;
        const dy = (size - h)/2;
        ctxp.drawImage(img, dx, dy, w, h);
        const imgData = ctxp.getImageData(0, 0, size, size);
        // Формат NCHW: [1, 3, size, size]
        const data = new Float32Array(3 * size * size);
        for (let i = 0; i < size * size; i++) {
            data[i] = imgData.data[i*4] / 255;           // R
            data[size*size + i] = imgData.data[i*4+1] / 255; // G
            data[2*size*size + i] = imgData.data[i*4+2] / 255; // B
        }
        // Диагностика: проверим, что есть ненулевые пиксели
        let maxVal = 0;
        for (let i = 0; i < size*size; i++) {
            if (data[i] > maxVal) maxVal = data[i];
        }
        log(`📊 Максимальное значение в красном канале: ${maxVal.toFixed(4)} (ожидается >0)`);
        return new ort.Tensor('float32', data, [1, 3, size, size]);
    }

    function iou(b1, b2) {
        const x1 = b1[0] - b1[2]/2, y1 = b1[1] - b1[3]/2;
        const x2 = b1[0] + b1[2]/2, y2 = b1[1] + b1[3]/2;
        const x1b = b2[0] - b2[2]/2, y1b = b2[1] - b2[3]/2;
        const x2b = b2[0] + b2[2]/2, y2b = b2[1] + b2[3]/2;
        const interX1 = Math.max(x1, x1b), interY1 = Math.max(y1, y1b);
        const interX2 = Math.min(x2, x2b), interY2 = Math.min(y2, y2b);
        const inter = Math.max(0, interX2 - interX1) * Math.max(0, interY2 - interY1);
        const area1 = (x2 - x1) * (y2 - y1);
        const area2 = (x2b - x1b) * (y2b - y1b);
        return inter / (area1 + area2 - inter);
    }

    function postprocess(outputTensor, imgWidth, imgHeight) {
    const dims = outputTensor.dims;   // [1, 85, 8400]
    const numPredictions = dims[2];   // 8400
    const numClasses = dims[1] - 5;   // 80

    // Anchors для YOLOv5 (стандартные для 640px)
    const anchors = [
        [10,13], [16,30], [33,23],   // для 80x80
        [30,61], [62,45], [59,119],  // для 40x40
        [116,90], [156,198], [373,326] // для 20x20
    ];
    // Шаг сетки для каждого масштаба (8400 = 80*80 + 40*40 + 20*20)
    const gridSteps = [80, 40, 20];
    const anchorIdx = [0, 3, 6]; // начало anch для каждого масштаба

    const data = outputTensor.data;
    const detections = [];

    let predOffset = 0;
    for (let s = 0; s < gridSteps.length; s++) {
        const gridSize = gridSteps[s];
        const numGridCells = gridSize * gridSize;
        const stride = 640 / gridSize;
        const anchorsThis = anchors.slice(anchorIdx[s], anchorIdx[s] + 3);

        for (let cell = 0; cell < numGridCells; cell++) {
            const row = Math.floor(cell / gridSize);
            const col = cell % gridSize;
            for (let a = 0; a < 3; a++) {
                const predIndex = predOffset + a * numPredictions;
                // tx, ty, tw, th, obj_conf, class_scores
                const tx = data[predIndex + cell];
                const ty = data[numPredictions + predIndex + cell];
                const tw = data[2 * numPredictions + predIndex + cell];
                const th = data[3 * numPredictions + predIndex + cell];
                const objConf = sigmoid(data[4 * numPredictions + predIndex + cell]);

                if (objConf < confThreshold) continue;

                // Правильное декодирование
                const cx = (sigmoid(tx) + col) / gridSize;
                const cy = (sigmoid(ty) + row) / gridSize;
                const w = (anchorsThis[a][0] * Math.exp(tw)) / 640;
                const h = (anchorsThis[a][1] * Math.exp(th)) / 640;

                let bestClass = -1, bestClassConf = 0;
                for (let c = 0; c < numClasses; c++) {
                    const clsProb = sigmoid(data[(5 + c) * numPredictions + predIndex + cell]);
                    if (clsProb > bestClassConf) {
                        bestClassConf = clsProb;
                        bestClass = c;
                    }
                }
                const confidence = objConf * bestClassConf;
                if (confidence < confThreshold) continue;

                detections.push({
                    bbox: [cx, cy, w, h],
                    confidence: confidence,
                    classId: bestClass
                });
            }
        }
        predOffset += 3 * numPredictions;
    }

    // NMS (оставьте ваш текущий iou и фильтрацию)
    detections.sort((a,b) => b.confidence - a.confidence);
    const final = [];
    for (let d of detections) {
        let keep = true;
        for (let f of final) {
            if (iou(d.bbox, f.bbox) > IOU_THRESH) { keep = false; break; }
        }
        if (keep) final.push(d);
    }
    log(`✅ После NMS: ${final.length}`);
    return final;
}

    function drawResults(detections, imgWidth, imgHeight) {
        canvas.width = imgWidth;
        canvas.height = imgHeight;
        ctx.drawImage(originalImg, 0, 0);
        for (let d of detections) {
            let cx = d.bbox[0] * imgWidth;
            let cy = d.bbox[1] * imgHeight;
            let w = d.bbox[2] * imgWidth;
            let h = d.bbox[3] * imgHeight;
            let x = cx - w/2, y = cy - h/2;
            ctx.strokeStyle = '#ffaa44';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            let name = classNames[d.classId] || `cls_${d.classId}`;
            ctx.fillStyle = '#ffcc88';
            ctx.font = '12px monospace';
            ctx.fillText(`${name} ${(d.confidence*100).toFixed(0)}%`, x, y-2);
        }
    }

    async function recognize(img) {
        if (!session) return;
        log(`⏳ Обработка изображения ${img.width}x${img.height}...`);
        try {
            const tensor = await preprocess(img);
            const feeds = { images: tensor };
            const output = await session.run(feeds);
            const outTensor = output['output0'];
            const detections = postprocess(outTensor);
            drawResults(detections, img.width, img.height);
            if (detections.length === 0) log(`⚠️ Ничего не найдено. Попробуйте снизить порог.`);
            else log(`🎉 Найдено ${detections.length} аспектов.`);
        } catch(e) { log(`❌ Ошибка распознавания: ${e.message}`); }
    }

    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            originalImg = img;
            recognize(img);
        };
        img.src = URL.createObjectURL(file);
    });

    init();
</script>
</body>
</html>
