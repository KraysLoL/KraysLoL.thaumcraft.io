<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Распознавание аспектов (диагностика)</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <style>
        body { font-family: monospace; background: #0a0f1e; color: #ddd; padding: 20px; max-width: 1300px; margin: 0 auto; }
        canvas { border: 1px solid #3e5a6c; max-width: 100%; background: #1e2a36; }
        .controls { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; align-items: center; }
        button, input[type="file"] { background: #2c4c6c; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
        .slider { flex: 1; min-width: 200px; }
        #log { background: #000; padding: 10px; max-height: 350px; overflow: auto; font-size: 11px; margin-top: 15px; }
        .status { color: #8bc34a; }
        input[type="checkbox"] { margin-left: 10px; transform: scale(1.2); vertical-align: middle; }
    </style>
</head>
<body>
<h2>🔍 Распознавание аспектов (диагностическая версия)</h2>
<div class="controls">
    <input type="file" id="upload" accept="image/*">
    <div class="slider">
        <label>Порог уверенности: <span id="confVal">0.25</span></label>
        <input type="range" id="conf" min="0.01" max="0.95" step="0.01" value="0.25">
    </div>
    <label>
        <input type="checkbox" id="bgrCheck"> BGR порядок каналов
    </label>
    <label>
        <input type="checkbox" id="disableSigmoidCheck" checked> Отключить сигмоиду (модель уже выдаёт вероятности)
    </label>
    <button id="clearLog">Очистить лог</button>
</div>
<canvas id="canvas" width="800" height="600"></canvas>
<div id="log"></div>

<script>
    let session = null;
    let classNames = [];
    let originalImg = null;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let confThreshold = 0.25;
    const IOU_THRESH = 0.45;
    const INPUT_SIZE = 640;

    // Якоря (можно будет заменить позже)
    const ANCHORS = [
        [10,13], [16,30], [33,23],
        [30,61], [62,45], [59,119],
        [116,90], [156,198], [373,326]
    ];

    document.getElementById('conf').addEventListener('input', (e) => {
        confThreshold = parseFloat(e.target.value);
        document.getElementById('confVal').innerText = confThreshold;
        if (originalImg) recognize(originalImg);
    });

    document.getElementById('clearLog').addEventListener('click', () => {
        document.getElementById('log').innerHTML = '';
    });

    function log(msg, isError = false) {
        const div = document.getElementById('log');
        const color = isError ? '#ff8888' : '#bbff88';
        div.innerHTML += `<div style="color:${color}">${msg}</div>`;
        div.scrollTop = div.scrollHeight;
        console.log(msg);
    }

    function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

    async function init() {
        try {
            const resp = await fetch('models/field_class_names.txt');
            if (!resp.ok) throw new Error(`Не найден файл models/field_class_names.txt (${resp.status})`);
            let text = await resp.text();
            let rawNames = text.split(/\r?\n/).filter(l => l.trim().length > 0);
            classNames = rawNames;
            log(`📄 Загружено имён классов: ${rawNames.length}`);

            log(`⏳ Загрузка модели...`);
            session = await ort.InferenceSession.create('models/field_object_detection.onnx');
            log(`✅ Модель загружена. Вход: ${session.inputNames}, выход: ${session.outputNames}`);
        } catch(e) { 
            log(`❌ Ошибка: ${e.message}`, true);
        }
    }

    function preprocess(img, useBGR) {
        const canvasPrep = document.createElement('canvas');
        canvasPrep.width = INPUT_SIZE;
        canvasPrep.height = INPUT_SIZE;
        const ctxp = canvasPrep.getContext('2d');
        ctxp.fillStyle = '#000';
        ctxp.fillRect(0, 0, INPUT_SIZE, INPUT_SIZE);
        const scale = Math.min(INPUT_SIZE / img.width, INPUT_SIZE / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        const dx = (INPUT_SIZE - w) / 2;
        const dy = (INPUT_SIZE - h) / 2;
        ctxp.drawImage(img, dx, dy, w, h);
        const imgData = ctxp.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
        const data = new Float32Array(3 * INPUT_SIZE * INPUT_SIZE);
        const size = INPUT_SIZE * INPUT_SIZE;
        for (let i = 0; i < size; i++) {
            const r = imgData.data[i*4] / 255;
            const g = imgData.data[i*4+1] / 255;
            const b = imgData.data[i*4+2] / 255;
            if (useBGR) {
                data[i] = b;               // B
                data[size + i] = g;        // G
                data[2*size + i] = r;      // R
            } else {
                data[i] = r;
                data[size + i] = g;
                data[2*size + i] = b;
            }
        }
        return new ort.Tensor('float32', data, [1, 3, INPUT_SIZE, INPUT_SIZE]);
    }

    function iou(b1, b2) {
        const x1 = b1[0] - b1[2]/2, y1 = b1[1] - b1[3]/2;
        const x2 = b1[0] + b1[2]/2, y2 = b1[1] + b1[3]/2;
        const x1b = b2[0] - b2[2]/2, y1b = b2[1] - b2[3]/2;
        const x2b = b2[0] + b2[2]/2, y2b = b2[1] + b2[3]/2;
        const interX1 = Math.max(x1, x1b), interY1 = Math.max(y1, y1b);
        const interX2 = Math.min(x2, x2b), interY2 = Math.min(y2, y2b);
        const inter = Math.max(0, interX2 - interX1) * Math.max(0, interY2 - interY1);
        const area1 = (x2 - x1) * (y2 - y1);
        const area2 = (x2b - x1b) * (y2b - y1b);
        return inter / (area1 + area2 - inter);
    }

    function postprocess(outputTensor, imgWidth, imgHeight, disableSigmoid) {
        let data = outputTensor.data;
        let dims = outputTensor.dims;
        let isTransposed = false;
        let numPredictions, numChannels;
        if (dims[1] === 85 && dims[2] > 85) {
            numChannels = 85;
            numPredictions = dims[2];
        } else if (dims[2] === 85 && dims[1] > 85) {
            numPredictions = dims[1];
            numChannels = 85;
            isTransposed = true;
        } else {
            log(`⚠️ Неизвестная размерность: ${dims}`, true);
            return [];
        }

        const numClasses = numChannels - 5;
        if (classNames.length !== numClasses) {
            log(`⚠️ Имён классов: ${classNames.length}, модель ожидает ${numClasses}. Обрезаю/дополняю.`, true);
            if (classNames.length > numClasses) classNames = classNames.slice(0, numClasses);
            else while(classNames.length < numClasses) classNames.push(`class_${classNames.length}`);
        }

        const gridSizes = [80, 40, 20];
        const strides = [8, 16, 32];
        const anchorsPerScale = [ANCHORS.slice(0,3), ANCHORS.slice(3,6), ANCHORS.slice(6,9)];
        
        let detections = [];
        let offset = 0;
        let predOffset = 0;

        // Собираем сырую статистику для диагностики
        let rawObjScores = [];
        let rawClassScores = [];

        for (let s = 0; s < gridSizes.length; s++) {
            const gridSize = gridSizes[s];
            const anchors = anchorsPerScale[s];
            const numGridCells = gridSize * gridSize;
            for (let cell = 0; cell < numGridCells; cell++) {
                const row = Math.floor(cell / gridSize);
                const col = cell % gridSize;
                for (let a = 0; a < 3; a++) {
                    let tx, ty, tw, th, objLogit;
                    let classLogits = new Array(numClasses);
                    if (!isTransposed) {
                        const idx = offset + cell;
                        tx = data[predOffset + idx];
                        ty = data[numPredictions + predOffset + idx];
                        tw = data[2*numPredictions + predOffset + idx];
                        th = data[3*numPredictions + predOffset + idx];
                        objLogit = data[4*numPredictions + predOffset + idx];
                        for (let c = 0; c < numClasses; c++) {
                            classLogits[c] = data[(5+c)*numPredictions + predOffset + idx];
                        }
                    } else {
                        const idx = offset + cell;
                        const base = idx * numChannels;
                        tx = data[base];
                        ty = data[base+1];
                        tw = data[base+2];
                        th = data[base+3];
                        objLogit = data[base+4];
                        for (let c = 0; c < numClasses; c++) {
                            classLogits[c] = data[base+5+c];
                        }
                    }

                    // Диагностика: собираем 1000 значений objLogit
                    if (rawObjScores.length < 1000 && objLogit !== undefined) {
                        rawObjScores.push(objLogit);
                        if (rawClassScores.length < 1000) rawClassScores.push(classLogits[0]); // первый класс
                    }

                    const objProb = disableSigmoid ? objLogit : sigmoid(objLogit);
                    if (objProb < confThreshold) continue;

                    const cx = (disableSigmoid ? tx : sigmoid(tx)) + col;
                    const cy = (disableSigmoid ? ty : sigmoid(ty)) + row;
                    const w = anchors[a][0] * Math.exp(tw);
                    const h = anchors[a][1] * Math.exp(th);

                    let bestClass = -1, bestProb = 0;
                    for (let c = 0; c < numClasses; c++) {
                        const prob = disableSigmoid ? classLogits[c] : sigmoid(classLogits[c]);
                        if (prob > bestProb) {
                            bestProb = prob;
                            bestClass = c;
                        }
                    }
                    const confidence = objProb * bestProb;
                    if (confidence < confThreshold) continue;

                    detections.push({
                        bbox: [cx / gridSize, cy / gridSize, w / INPUT_SIZE, h / INPUT_SIZE],
                        confidence: confidence,
                        classId: bestClass
                    });
                }
            }
            offset += numGridCells;
            predOffset += 3 * numPredictions;
        }

        // Выводим диагностику сырых значений
        if (rawObjScores.length) {
            const avgObj = rawObjScores.reduce((a,b)=>a+b,0)/rawObjScores.length;
            const minObj = Math.min(...rawObjScores);
            const maxObj = Math.max(...rawObjScores);
            const avgCls = rawClassScores.reduce((a,b)=>a+b,0)/rawClassScores.length;
            log(`📊 Сырая объектность: средняя ${avgObj.toFixed(3)}, мин ${minObj.toFixed(3)}, макс ${maxObj.toFixed(3)}`);
            log(`📊 Сырой класс (первый): средний ${avgCls.toFixed(3)}`);
            if (!disableSigmoid && avgObj > 0.5 && avgObj < 2) {
                log(`💡 Совет: похоже, модель уже выдаёт вероятности (средняя объектность ${avgObj.toFixed(2)}). Рекомендую включить "Отключить сигмоиду".`);
            }
            if (disableSigmoid && avgObj > 0 && avgObj < 0.3) {
                log(`💡 Совет: значения объектности очень низкие (средняя ${avgObj.toFixed(2)}). Попробуйте выключить "Отключить сигмоиду" или снизить порог.`);
            }
        }

        log(`🔍 До NMS: ${detections.length}`);
        if (detections.length === 0) return [];

        detections.sort((a,b) => b.confidence - a.confidence);
        const final = [];
        for (let d of detections) {
            let keep = true;
            for (let f of final) {
                if (iou(d.bbox, f.bbox) > IOU_THRESH) { keep = false; break; }
            }
            if (keep) final.push(d);
        }

        // Пересчёт координат из letterbox
        const scale = Math.min(INPUT_SIZE / imgWidth, INPUT_SIZE / imgHeight);
        const padX = (INPUT_SIZE - imgWidth * scale) / 2 / INPUT_SIZE;
        const padY = (INPUT_SIZE - imgHeight * scale) / 2 / INPUT_SIZE;
        const imgScale = scale;
        for (let d of final) {
            let cx = d.bbox[0];
            let cy = d.bbox[1];
            let w = d.bbox[2];
            let h = d.bbox[3];
            cx = (cx - padX) / imgScale;
            cy = (cy - padY) / imgScale;
            w = w / imgScale;
            h = h / imgScale;
            d.bbox[0] = Math.min(1, Math.max(0, cx));
            d.bbox[1] = Math.min(1, Math.max(0, cy));
            d.bbox[2] = Math.min(1, Math.max(0, w));
            d.bbox[3] = Math.min(1, Math.max(0, h));
        }
        return final;
    }

    function drawResults(detections, img) {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        if (detections.length === 0) {
            ctx.fillStyle = 'white';
            ctx.font = '16px monospace';
            ctx.fillText('Ничего не найдено', 20, 40);
            return;
        }
        for (let d of detections) {
            let x = d.bbox[0] * img.width - (d.bbox[2] * img.width)/2;
            let y = d.bbox[1] * img.height - (d.bbox[3] * img.height)/2;
            let w = d.bbox[2] * img.width;
            let h = d.bbox[3] * img.height;
            ctx.strokeStyle = '#ffaa44';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            let name = classNames[d.classId] || `cls_${d.classId}`;
            ctx.fillStyle = '#ffcc88';
            ctx.font = '14px monospace';
            ctx.fillText(`${name} ${(d.confidence*100).toFixed(1)}%`, x, y-4);
        }
    }

    async function recognize(img) {
        if (!session) { log('Модель не загружена', true); return; }
        const useBGR = document.getElementById('bgrCheck').checked;
        const disableSigmoid = document.getElementById('disableSigmoidCheck').checked;
        log(`⚙️ Настройки: BGR=${useBGR}, сигмоида=${disableSigmoid ? "ВЫКЛ (модель уже выдаёт вероятности)" : "ВКЛ"}`);
        log(`⏳ Обработка ${img.width}x${img.height}...`);
        try {
            const tensor = preprocess(img, useBGR);
            const feeds = { images: tensor };
            const output = await session.run(feeds);
            const outTensor = output['output0'];
            const detections = postprocess(outTensor, img.width, img.height, disableSigmoid);
            drawResults(detections, img);
            log(`🎉 Найдено ${detections.length} аспектов.`);
            if (detections.length > 0) {
                const unique = new Set();
                detections.forEach(d => unique.add(classNames[d.classId]));
                log(`   Классы: ${Array.from(unique).join(', ')}`);
            } else {
                log(`⚠️ Ничего не найдено. Попробуйте снизить порог или изменить настройки BGR/сигмоиды.`);
            }
        } catch(e) { log(`❌ Ошибка: ${e.message}`, true); }
    }

    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            originalImg = img;
            recognize(img);
        };
        img.src = URL.createObjectURL(file);
    });

    init();
</script>
</body>
</html>
