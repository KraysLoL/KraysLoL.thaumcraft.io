<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>YOLOv5 ONNX detector</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>

<style>

body{
background:#0b1020;
color:#ddd;
font-family:monospace;
padding:20px;
max-width:1400px;
margin:auto;
}

canvas{
border:1px solid #555;
max-width:100%;
}

#log{
margin-top:20px;
background:black;
padding:10px;
max-height:300px;
overflow:auto;
font-size:11px;
}

.controls{
display:flex;
gap:20px;
margin-bottom:20px;
}

</style>
</head>
<body>

<h2>YOLO detector</h2>

<div class="controls">

<input type=file id=upload>

<label>
conf
<input
type=range
min=0
max=1
step=.01
value=.25
id=conf>
<span id=confv>.25</span>
</label>

</div>

<canvas id=canvas></canvas>

<div id=log></div>


<script>

const INPUT=640;
const IOU=.45;

let session=null;
let classNames=[];
let originalImg=null;
let conf=.25;

const canvas=
document.getElementById(
"canvas"
);

const ctx=
canvas.getContext(
"2d"
);

function log(s,e=false){

let div=
document.getElementById(
"log"
);

div.innerHTML+=
`<div style='color:${
e?"#f88":"#9f9"
}'>${s}</div>`;

div.scrollTop=
div.scrollHeight;

console.log(s);

}


function sigmoid(x){

return 1/(1+Math.exp(-x));

}


document
.getElementById("conf")
.oninput=e=>{

conf=
parseFloat(
e.target.value
);

document
.getElementById(
"confv"
)
.innerText=
conf;

if(originalImg)
recognize(
originalImg
);

};


async function init(){

let txt=
await(
await fetch(
"models/field_class_names.txt"
)
).text();

classNames=
txt
.split(/\r?\n/)
.filter(x=>x);

log(
"classes="+
classNames.length
);

session=
await ort
.InferenceSession
.create(
"models/field_object_detection.onnx"
);

log(
"input="+
session.inputNames
);

log(
"output="+
session.outputNames
);

}


function preprocess(img){

const c=
document.createElement(
"canvas"
);

c.width=INPUT;
c.height=INPUT;

let cx=
c.getContext(
"2d"
);

cx.fillStyle=
"black";

cx.fillRect(
0,
0,
INPUT,
INPUT
);

let scale=
Math.min(
INPUT/img.width,
INPUT/img.height
);

let w=
img.width*scale;

let h=
img.height*scale;

let dx=
(INPUT-w)/2;

let dy=
(INPUT-h)/2;

cx.drawImage(
img,
dx,
dy,
w,
h
);

let pixels=
cx
.getImageData(
0,
0,
INPUT,
INPUT
)
.data;

let size=
INPUT*INPUT;

let data=
new Float32Array(
3*size
);

for(
let i=0;
i<size;
i++
){

let r=
pixels[i*4]/255;

let g=
pixels[i*4+1]/255;

let b=
pixels[i*4+2]/255;

data[i]=r;
data[size+i]=g;
data[size*2+i]=b;

}

return {

tensor:
new ort.Tensor(
"float32",
data,
[1,3,INPUT,INPUT]
),

scale,
dx,
dy

};

}



function iou(a,b){

let x1=
Math.max(
a.x,
b.x
);

let y1=
Math.max(
a.y,
b.y
);

let x2=
Math.min(
a.x+a.w,
b.x+b.w
);

let y2=
Math.min(
a.y+a.h,
b.y+b.h
);

let inter=
Math.max(
0,
x2-x1
)
*
Math.max(
0,
y2-y1
);

let area=
a.w*a.h+
b.w*b.h-
inter;

return inter/area;

}


async function recognize(img){

const prep=
preprocess(img);

const output=
await session.run({

images:
prep.tensor

});

const out=
output.output0;

const data=
out.data;

const dims=
out.dims;

log(
"dims="+
JSON.stringify(
dims
)
);

let numChannels=
dims[1];

let numPred=
dims[2];


for(
let i=0;
i<15;
i++
){

log(
data[i]
.toFixed(2)
);

}


let det=[];


for(
let i=0;
i<numPred;
i++
){

let cx=
data[
0*numPred+i
];

let cy=
data[
1*numPred+i
];

let w=
data[
2*numPred+i
];

let h=
data[
3*numPred+i
];

let obj=
sigmoid(
data[
4*numPred+i
]
);

if(
obj<conf
)
continue;


let best=0;

let cls=-1;


for(
let c=0;
c<80;
c++
){

let p=
sigmoid(

data[
(c+5)
*
numPred+i
]

);

if(
p>best
){

best=p;

cls=c;

}

}


let score=
obj*best;

if(
score<conf
)
continue;


det.push({

x:cx-w/2,
y:cy-h/2,
w,
h,

score,
cls

});

}


log(
"before nms="+
det.length
);


det.sort(
(a,b)=>
b.score-a.score
);


let final=[];

for(
let d of det
){

let ok=true;

for(
let f of final
){

if(
iou(
d,
f
)>IOU
){

ok=false;

break;

}

}

if(ok)
final.push(d);

}


log(
"FINAL="+
final.length
);


canvas.width=
img.width;

canvas.height=
img.height;

ctx.drawImage(
img,
0,
0
);


for(
let d of final
){

let x=
(d.x-prep.dx)
/prep.scale;

let y=
(d.y-prep.dy)
/prep.scale;

let w=
d.w/
prep.scale;

let h=
d.h/
prep.scale;


ctx.strokeStyle=
"#ff0";

ctx.lineWidth=2;

ctx.strokeRect(
x,
y,
w,
h
);


ctx.fillStyle=
"#ff0";

ctx.fillText(

classNames[
d.cls
]+
" "+
(
d.score*100
)
.toFixed(1)+
"%",

x,
y-5

);

}

}



document
.getElementById(
"upload"
)
.onchange=e=>{

let f=
e.target.files[0];

let img=
new Image();

img.onload=()=>{

originalImg=
img;

recognize(
img
);

};

img.src=
URL.createObjectURL(
f
);

};


init();

</script>

</body>
</html>
