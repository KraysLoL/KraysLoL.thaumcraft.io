<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Распознавание аспектов | Отладка</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <style>
        body { font-family: monospace; background: #0a0f1e; color: #ddd; padding: 20px; }
        canvas { border: 1px solid #3e5a6c; max-width: 100%; }
        .slider { margin: 10px 0; }
        button { background: #2c4c6c; color: white; border: none; padding: 6px 12px; cursor: pointer; }
        #log { background: #000; padding: 10px; max-height: 300px; overflow: auto; font-size: 11px; }
    </style>
</head>
<body>
<h2>🔍 Отладка ONNX модели</h2>
<input type="file" id="upload" accept="image/*">
<div class="slider">
    <label>Порог: <span id="confVal">0.3</span></label>
    <input type="range" id="conf" min="0.05" max="0.9" step="0.01" value="0.3">
</div>
<canvas id="canvas"></canvas>
<div id="log"></div>

<script>
    let session = null;
    let classNames = [];
    let originalImg = null;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let confThreshold = 0.3;
    const IOU_THRESH = 0.45;

    document.getElementById('conf').addEventListener('input', (e) => {
        confThreshold = parseFloat(e.target.value);
        document.getElementById('confVal').innerText = confThreshold;
        if (originalImg) recognize(originalImg);
    });

    async function init() {
        try {
            // Загрузка классов
            const resp = await fetch('models/field_class_names.txt');
            const text = await resp.text();
            classNames = text.split(/\r?\n/).filter(l => l.trim());
            log(`✅ Загружено классов: ${classNames.length}`);
            
            // Загрузка модели
            log(`⏳ Загрузка модели...`);
            session = await ort.InferenceSession.create('models/field_object_detection.onnx');
            log(`✅ Модель загружена. Формат входа: ${session.inputNames}, выхода: ${session.outputNames}`);
        } catch(e) { log(`❌ Ошибка: ${e.message}`); }
    }

    function log(msg) {
        const div = document.getElementById('log');
        div.innerHTML += `<div>${msg}</div>`;
        div.scrollTop = div.scrollHeight;
        console.log(msg);
    }

    async function preprocess(img) {
        const size = 640;
        const canvasPrep = document.createElement('canvas');
        canvasPrep.width = size;
        canvasPrep.height = size;
        const ctxp = canvasPrep.getContext('2d');
        ctxp.fillStyle = '#000';
        ctxp.fillRect(0, 0, size, size);
        const scale = Math.min(size / img.width, size / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        const dx = (size - w)/2;
        const dy = (size - h)/2;
        ctxp.drawImage(img, dx, dy, w, h);
        const imgData = ctxp.getImageData(0, 0, size, size);
        const data = new Float32Array(size * size * 3);
        for (let i = 0; i < size*size; i++) {
            data[i*3] = imgData.data[i*4] / 255;
            data[i*3+1] = imgData.data[i*4+1] / 255;
            data[i*3+2] = imgData.data[i*4+2] / 255;
        }
        return new ort.Tensor('float32', data, [1, 3, size, size]);
    }

    function iou(b1, b2) {
        const x1 = b1[0] - b1[2]/2, y1 = b1[1] - b1[3]/2;
        const x2 = b1[0] + b1[2]/2, y2 = b1[1] + b1[3]/2;
        const x1b = b2[0] - b2[2]/2, y1b = b2[1] - b2[3]/2;
        const x2b = b2[0] + b2[2]/2, y2b = b2[1] + b2[3]/2;
        const interX1 = Math.max(x1, x1b), interY1 = Math.max(y1, y1b);
        const interX2 = Math.min(x2, x2b), interY2 = Math.min(y2, y2b);
        const inter = Math.max(0, interX2 - interX1) * Math.max(0, interY2 - interY1);
        const area1 = (x2 - x1) * (y2 - y1);
        const area2 = (x2b - x1b) * (y2b - y1b);
        return inter / (area1 + area2 - inter);
    }

    function postprocess(outputTensor) {
        const dims = outputTensor.dims;
        log(`📐 Размерность выхода: ${dims}`);
        const numPred = dims[2]; // 8400
        const numClasses = dims[1] - 5; // 80
        const data = outputTensor.data;
        
        // Выведем первые 20 значений для понимания
        log(`🔢 Первые 20 значений выхода: ${Array.from(data.slice(0, 20)).map(v=>v.toFixed(4)).join(', ')}`);
        
        // Проверим, есть ли большие значения (например, координаты могут быть >1)
        let maxVal = -Infinity, minVal = Infinity;
        for (let i = 0; i < Math.min(1000, data.length); i++) {
            if (data[i] > maxVal) maxVal = data[i];
            if (data[i] < minVal) minVal = data[i];
        }
        log(`📊 Диапазон первых 1000 значений: ${minVal.toFixed(4)} .. ${maxVal.toFixed(4)}`);
        
        const detections = [];
        for (let i = 0; i < numPred; i++) {
            const cx = data[i];
            const cy = data[numPred + i];
            const w = data[2*numPred + i];
            const h = data[3*numPred + i];
            const objConf = data[4*numPred + i];
            if (objConf < confThreshold) continue;
            
            let bestClass = -1, bestConf = 0;
            for (let c = 0; c < numClasses; c++) {
                const clsConf = data[(5 + c)*numPred + i];
                if (clsConf > bestConf) {
                    bestConf = clsConf;
                    bestClass = c;
                }
            }
            const confidence = objConf * bestConf;
            if (confidence < confThreshold) continue;
            detections.push({ bbox: [cx, cy, w, h], confidence, classId: bestClass });
        }
        log(`🔍 До NMS: ${detections.length}`);
        
        // NMS
        detections.sort((a,b) => b.confidence - a.confidence);
        const final = [];
        for (let d of detections) {
            let keep = true;
            for (let f of final) {
                if (iou(d.bbox, f.bbox) > IOU_THRESH) { keep = false; break; }
            }
            if (keep) final.push(d);
        }
        log(`✅ После NMS: ${final.length}`);
        return final;
    }

    function drawResults(detections, imgWidth, imgHeight) {
        canvas.width = imgWidth;
        canvas.height = imgHeight;
        ctx.drawImage(originalImg, 0, 0);
        for (let d of detections) {
            let cx = d.bbox[0] * imgWidth;
            let cy = d.bbox[1] * imgHeight;
            let w = d.bbox[2] * imgWidth;
            let h = d.bbox[3] * imgHeight;
            let x = cx - w/2, y = cy - h/2;
            ctx.strokeStyle = '#ffaa44';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            let name = classNames[d.classId] || `cls_${d.classId}`;
            ctx.fillStyle = '#ffcc88';
            ctx.font = '12px monospace';
            ctx.fillText(`${name} ${(d.confidence*100).toFixed(0)}%`, x, y-2);
        }
    }

    async function recognize(img) {
        if (!session) return;
        log(`⏳ Распознавание...`);
        try {
            const tensor = await preprocess(img);
            const feeds = { images: tensor };
            const output = await session.run(feeds);
            const outTensor = output['output0'];
            const detections = postprocess(outTensor);
            const scaled = detections.map(d => ({
                ...d,
                bbox: [d.bbox[0], d.bbox[1], d.bbox[2], d.bbox[3]] // относительные, 0..1
            }));
            drawResults(scaled, img.width, img.height);
            if (scaled.length === 0) log(`⚠️ Ничего не найдено. Попробуйте снизить порог.`);
            else log(`🎉 Найдено ${scaled.length} аспектов.`);
        } catch(e) { log(`❌ Ошибка: ${e.message}`); }
    }

    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            originalImg = img;
            recognize(img);
        };
        img.src = URL.createObjectURL(file);
    });

    init();
</script>
</body>
</html>
