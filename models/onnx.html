<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Распознавание аспектов (YOLO v5/v8)</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <style>
        body { font-family: monospace; background: #0a0f1e; color: #ddd; padding: 20px; max-width: 1200px; margin: 0 auto; }
        canvas { border: 1px solid #3e5a6c; max-width: 100%; background: #1e2a36; }
        .controls { display: flex; gap: 20px; flex-wrap: wrap; margin: 15px 0; align-items: center; }
        button, input[type="file"] { background: #2c4c6c; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #3e6a8c; }
        .slider { flex: 1; min-width: 200px; }
        #log { background: #000; padding: 10px; max-height: 300px; overflow: auto; font-size: 11px; margin-top: 15px; }
        .status { color: #8bc34a; }
    </style>
</head>
<body>
<h2>🔍 Распознавание аспектов (исправленный постпроцессинг)</h2>
<div class="controls">
    <input type="file" id="upload" accept="image/*">
    <div class="slider">
        <label>Порог уверенности: <span id="confVal">0.35</span></label>
        <input type="range" id="conf" min="0.05" max="0.95" step="0.01" value="0.35">
    </div>
    <button id="clearLog">Очистить лог</button>
</div>
<canvas id="canvas" width="800" height="600"></canvas>
<div id="log"></div>

<script>
    let session = null;
    let classNames = [];
    let originalImg = null;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let confThreshold = 0.35;
    const IOU_THRESH = 0.45;
    const INPUT_SIZE = 640;     // Модель обучена на 640x640

    // Якоря для YOLOv5 (стандартные для INPUT_SIZE=640)
    // Распределены по трём масштабам: 80x80, 40x40, 20x20
    const ANCHORS = [
        [10,13], [16,30], [33,23],   // stride 8
        [30,61], [62,45], [59,119],  // stride 16
        [116,90], [156,198], [373,326] // stride 32
    ];

    document.getElementById('conf').addEventListener('input', (e) => {
        confThreshold = parseFloat(e.target.value);
        document.getElementById('confVal').innerText = confThreshold;
        if (originalImg) recognize(originalImg);
    });

    document.getElementById('clearLog').addEventListener('click', () => {
        document.getElementById('log').innerHTML = '';
    });

    function log(msg, isError = false) {
        const div = document.getElementById('log');
        const color = isError ? '#ff8888' : '#bbff88';
        div.innerHTML += `<div style="color:${color}">${msg}</div>`;
        div.scrollTop = div.scrollHeight;
        console.log(msg);
    }

    // Сигмоида (нужна только для tx, ty, tw, th, а также для объектности/классов, если модель выдаёт логиты)
    function sigmoid(x) {
        return 1 / (1 + Math.exp(-x));
    }

    async function init() {
        try {
            // Загружаем имена классов
            const resp = await fetch('models/field_class_names.txt');
            if (!resp.ok) throw new Error(`Не найден файл models/field_class_names.txt (${resp.status})`);
            let text = await resp.text();
            let rawNames = text.split(/\r?\n/).filter(l => l.trim().length > 0);
            log(`📄 Загружено имён классов: ${rawNames.length}`);

            // Определяем количество классов из будущей модели (85-5=80)
            // Пока неизвестно, но позже скорректируем
            classNames = rawNames;
            
            log(`⏳ Загрузка модели...`);
            session = await ort.InferenceSession.create('models/field_object_detection.onnx');
            log(`✅ Модель загружена. Вход: ${session.inputNames}, выход: ${session.outputNames}`);
            
            // После загрузки модели узнаем точное число классов
            if (session.outputNames.includes('output0')) {
                // Тестовый запуск не нужен, просто проверим размерность потом при первом прогоне
                log(`ℹ️ Модель YOLO, ожидается выход [1, 85, 8400] или [1, 8400, 85]`);
            }
        } catch(e) { 
            log(`❌ Ошибка инициализации: ${e.message}`, true);
        }
    }

    // Предобработка: letterbox + нормализация в [0,1], формат NCHW
    async function preprocess(img) {
        const canvasPrep = document.createElement('canvas');
        canvasPrep.width = INPUT_SIZE;
        canvasPrep.height = INPUT_SIZE;
        const ctxp = canvasPrep.getContext('2d');
        ctxp.fillStyle = '#000';
        ctxp.fillRect(0, 0, INPUT_SIZE, INPUT_SIZE);
        
        const scale = Math.min(INPUT_SIZE / img.width, INPUT_SIZE / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        const dx = (INPUT_SIZE - w) / 2;
        const dy = (INPUT_SIZE - h) / 2;
        ctxp.drawImage(img, dx, dy, w, h);
        
        const imgData = ctxp.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
        const data = new Float32Array(3 * INPUT_SIZE * INPUT_SIZE);
        for (let i = 0; i < INPUT_SIZE * INPUT_SIZE; i++) {
            data[i] = imgData.data[i*4] / 255;           // R
            data[INPUT_SIZE*INPUT_SIZE + i] = imgData.data[i*4+1] / 255; // G
            data[2*INPUT_SIZE*INPUT_SIZE + i] = imgData.data[i*4+2] / 255; // B
        }
        return new ort.Tensor('float32', data, [1, 3, INPUT_SIZE, INPUT_SIZE]);
    }

    // Вычисление IoU
    function iou(b1, b2) {
        const x1 = b1[0] - b1[2]/2, y1 = b1[1] - b1[3]/2;
        const x2 = b1[0] + b1[2]/2, y2 = b1[1] + b1[3]/2;
        const x1b = b2[0] - b2[2]/2, y1b = b2[1] - b2[3]/2;
        const x2b = b2[0] + b2[2]/2, y2b = b2[1] + b2[3]/2;
        const interX1 = Math.max(x1, x1b), interY1 = Math.max(y1, y1b);
        const interX2 = Math.min(x2, x2b), interY2 = Math.min(y2, y2b);
        const inter = Math.max(0, interX2 - interX1) * Math.max(0, interY2 - interY1);
        const area1 = (x2 - x1) * (y2 - y1);
        const area2 = (x2b - x1b) * (y2b - y1b);
        return inter / (area1 + area2 - inter);
    }

    // Постпроцессинг для YOLO с grid и anchors
    function postprocess(outputTensor, imgWidth, imgHeight) {
        let data = outputTensor.data;
        let dims = outputTensor.dims;
        // Поддержка форматов [1, 85, 8400] и [1, 8400, 85]
        let isTransposed = false;
        let numPredictions, numChannels;
        if (dims[1] === 85 && dims[2] > 85) {
            // [1, 85, 8400]
            numChannels = 85;
            numPredictions = dims[2];
        } else if (dims[2] === 85 && dims[1] > 85) {
            // [1, 8400, 85] — транспонированный
            numPredictions = dims[1];
            numChannels = 85;
            isTransposed = true;
        } else {
            log(`⚠️ Неизвестная размерность выхода: ${dims}`, true);
            return [];
        }

        const numClasses = numChannels - 5; // = 80
        log(`📊 Детекций: ${numPredictions}, классов: ${numClasses}`);

        // Корректировка списка имён классов (если их больше, чем классов в модели)
        if (classNames.length > numClasses) {
            log(`⚠️ В файле ${classNames.length} имён, а модель ожидает ${numClasses}. Обрезаю до ${numClasses}.`, true);
            classNames = classNames.slice(0, numClasses);
        } else if (classNames.length < numClasses) {
            log(`⚠️ В файле только ${classNames.length} имён, модель ожидает ${numClasses}. Дополняю пустыми.`, true);
            while(classNames.length < numClasses) classNames.push(`class_${classNames.length}`);
        }

        // Определяем размеры сеток для трёх масштабов
        const gridSizes = [80, 40, 20];   // потому что 640/8=80, 640/16=40, 640/32=20
        const strides = [8, 16, 32];
        const anchorsPerScale = [ANCHORS.slice(0,3), ANCHORS.slice(3,6), ANCHORS.slice(6,9)];
        
        let detections = [];
        let offset = 0;
        let predIndex = 0; // для формата [1,85,8400] идём по батчу

        for (let s = 0; s < gridSizes.length; s++) {
            const gridSize = gridSizes[s];
            const stride = strides[s];
            const anchors = anchorsPerScale[s];
            const numGridCells = gridSize * gridSize;
            
            for (let cell = 0; cell < numGridCells; cell++) {
                const row = Math.floor(cell / gridSize);
                const col = cell % gridSize;
                for (let a = 0; a < 3; a++) {
                    let tx, ty, tw, th, objLogit;
                    let classLogits = new Array(numClasses);
                    
                    if (!isTransposed) {
                        // Формат [1,85,8400]
                        const idx = offset + cell;
                        tx = data[predIndex + idx];
                        ty = data[numPredictions + predIndex + idx];
                        tw = data[2*numPredictions + predIndex + idx];
                        th = data[3*numPredictions + predIndex + idx];
                        objLogit = data[4*numPredictions + predIndex + idx];
                        for (let c = 0; c < numClasses; c++) {
                            classLogits[c] = data[(5+c)*numPredictions + predIndex + idx];
                        }
                    } else {
                        // Формат [1,8400,85]
                        const idx = offset + cell;
                        const base = idx * numChannels;
                        tx = data[base];
                        ty = data[base+1];
                        tw = data[base+2];
                        th = data[base+3];
                        objLogit = data[base+4];
                        for (let c = 0; c < numClasses; c++) {
                            classLogits[c] = data[base+5+c];
                        }
                    }
                    
                    // Применяем sigmoid к tx, ty, objLogit и classLogits
                    // (для tw, th используем exp, без сигмоиды)
                    const objProb = sigmoid(objLogit);
                    if (objProb < confThreshold) continue;
                    
                    // Декодирование координат (YOLO)
                    const cx = (sigmoid(tx) + col) / gridSize;
                    const cy = (sigmoid(ty) + row) / gridSize;
                    const w = (anchors[a][0] * Math.exp(tw)) / INPUT_SIZE;
                    const h = (anchors[a][1] * Math.exp(th)) / INPUT_SIZE;
                    
                    // Поиск лучшего класса
                    let bestClass = -1, bestProb = 0;
                    for (let c = 0; c < numClasses; c++) {
                        const prob = sigmoid(classLogits[c]);
                        if (prob > bestProb) {
                            bestProb = prob;
                            bestClass = c;
                        }
                    }
                    const confidence = objProb * bestProb;
                    if (confidence < confThreshold) continue;
                    
                    detections.push({
                        bbox: [cx, cy, w, h],
                        confidence: confidence,
                        classId: bestClass
                    });
                }
            }
            offset += numGridCells;
            predIndex += 3 * numPredictions; // для формата [1,85,8400] следующий "якорь"
        }
        
        log(`🔍 До NMS: ${detections.length}`);
        if (detections.length === 0) return [];
        
        // NMS (сортировка по убыванию уверенности)
        detections.sort((a,b) => b.confidence - a.confidence);
        const final = [];
        for (let d of detections) {
            let keep = true;
            for (let f of final) {
                if (iou(d.bbox, f.bbox) > IOU_THRESH) {
                    keep = false;
                    break;
                }
            }
            if (keep) final.push(d);
        }
        
        // Преобразование координат из относительных (0..1) в абсолютные пиксели оригинального изображения
        // Важно: модель работала на квадратном INPUT_SIZE с letterbox, поэтому нужно отмаппить обратно
        // Для этого надо знать, где были реальные границы изображения внутри letterbox
        // Для простоты используем прямое масштабирование, но если нужна точная коррекция - добавим позже.
        // Поскольку мы рисуем на canvas с оригинальными размерами, координаты из выходов модели соответствуют
        // виртуальному квадрату 640x640. Чтобы привести к оригинальному изображению, нужно учесть scale и offset.
        // Сделаем пересчет:
        const scale = Math.min(INPUT_SIZE / imgWidth, INPUT_SIZE / imgHeight);
        const padX = (INPUT_SIZE - imgWidth * scale) / 2 / INPUT_SIZE;
        const padY = (INPUT_SIZE - imgHeight * scale) / 2 / INPUT_SIZE;
        const imgScale = Math.min(INPUT_SIZE / imgWidth, INPUT_SIZE / imgHeight);
        
        for (let d of final) {
            // Относительные координаты внутри 640x640 (с letterbox)
            let cx = d.bbox[0];
            let cy = d.bbox[1];
            let w = d.bbox[2];
            let h = d.bbox[3];
            // Убираем паддинг
            cx = (cx - padX) / imgScale;
            cy = (cy - padY) / imgScale;
            w = w / imgScale;
            h = h / imgScale;
            // Ограничиваем [0,1]
            d.bbox[0] = Math.min(1, Math.max(0, cx));
            d.bbox[1] = Math.min(1, Math.max(0, cy));
            d.bbox[2] = Math.min(1, Math.max(0, w));
            d.bbox[3] = Math.min(1, Math.max(0, h));
        }
        
        return final;
    }

    function drawResults(detections, img) {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        for (let d of detections) {
            let x = d.bbox[0] * img.width - (d.bbox[2] * img.width)/2;
            let y = d.bbox[1] * img.height - (d.bbox[3] * img.height)/2;
            let w = d.bbox[2] * img.width;
            let h = d.bbox[3] * img.height;
            ctx.strokeStyle = '#ffaa44';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            let name = classNames[d.classId] || `cls_${d.classId}`;
            ctx.fillStyle = '#ffcc88';
            ctx.font = '14px monospace';
            ctx.fillText(`${name} ${(d.confidence*100).toFixed(1)}%`, x, y-4);
        }
        if (detections.length === 0) {
            ctx.fillStyle = 'white';
            ctx.font = '16px monospace';
            ctx.fillText('Ничего не найдено', 20, 40);
        }
    }

    async function recognize(img) {
        if (!session) {
            log('Модель еще не загружена', true);
            return;
        }
        log(`⏳ Обработка ${img.width}x${img.height}...`);
        try {
            const tensor = await preprocess(img);
            const feeds = { images: tensor };
            const output = await session.run(feeds);
            const outTensor = output['output0'];
            const detections = postprocess(outTensor, img.width, img.height);
            drawResults(detections, img);
            log(`🎉 Найдено ${detections.length} аспектов.`);
            detections.forEach(d => {
                const name = classNames[d.classId] || `класс_${d.classId}`;
                log(`   - ${name} (${(d.confidence*100).toFixed(1)}%)`);
            });
            if (detections.length === 0) log(`⚠️ Ничего не найдено. Попробуйте снизить порог до 0.2 или ниже.`);
        } catch(e) {
            log(`❌ Ошибка: ${e.message}`, true);
        }
    }

    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            originalImg = img;
            recognize(img);
        };
        img.src = URL.createObjectURL(file);
    });

    init();
</script>
</body>
</html>
